<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>FurAffinity Archive</title>
  <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />
  <meta name="description" content="Archive of official FurAffinity promotional images collected over time">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0">

  <!-- Classic favicon -->
  <link rel="icon" href="resources/favicon.ico" sizes="any">
  <link rel="icon" type="image/svg+xml" href="resources/icon.svg">

  <!-- PNG fallbacks -->
  <link rel="icon" type="image/png" sizes="32x32" href="resources/favicon-32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="resources/favicon-16.png">

  <!-- Apple -->
  <link rel="apple-touch-icon" sizes="180x180" href="resources/apple-touch-icon.png">

  <!-- Android / PWA -->
  <link rel="icon" type="image/png" sizes="192x192" href="resources/android-chrome-192x192.png">
  <link rel="icon" type="image/png" sizes="512x512" href="resources/android-chrome-512x512.png">

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@latest/css/fontawesome.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@latest/css/brands.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@latest/css/regular.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@latest/css/solid.css" />

  <link rel="stylesheet" media="(prefers-color-scheme: light)" href="https://cdn.jsdelivr.net/npm/docsify-themeable@latest/dist/css/theme-simple.css">
  <link rel="stylesheet" media="(prefers-color-scheme: dark)" href="https://cdn.jsdelivr.net/npm/docsify-themeable@latest/dist/css/theme-simple-dark.css">

  <!-- GLightbox for fa-archive gallery -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/glightbox@latest/dist/css/glightbox.min.css">
  <link rel="stylesheet" href="plugins/fa-archive-gallery.css">
</head>

<body>
  <div id="app"></div>
  <script>
    window.$docsify = {
      name: 'FurAffinity Archive',
      repo: 'https://github.com/Midori-Dragon/furaffinity-archive',
      homepage: 'home.md',
      loadSidebar: true,
      logo: 'resources/icon-x64.png',
      nativeEmoji: true,
      notFoundPage: true,
      relativePath: true,
      enableSidebarCollapse: true,

      auto2top: true,
      maxLevel: 3,
      subMaxLevel: 3,
    }
  </script>

  <script src="https://cdn.jsdelivr.net/npm/docsify@latest/lib/docsify.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify-themeable@latest/dist/js/docsify-themeable.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify-sidebar-collapse@latest/dist/docsify-sidebar-collapse.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify@latest/lib/plugins/search.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify@latest/lib/plugins/zoom-image.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify-fontawesome@latest/dist/docsify-fontawesome.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/glightbox@latest/dist/js/glightbox.min.js"></script>
  <script src="plugins/fa-archive-gallery.js"></script>

</html>
